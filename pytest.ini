[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
addopts = -ra --tb=short
norecursedirs = scripts coq build .venv .git .vscode .github artifacts benchmarks configs figures forge physics proofpacks proofs receipts results src thesis thielecpu web tests/disabled archive
per_test_timeout = 15
markers =
    integration: marks tests that exercise external toolchains (iverilog/vvp)
    slow: marks tests as slow (may take significant time)
    hardware: marks tests that require hardware simulation
    coq: marks tests that require Coq toolchain and extracted runner
    strict_extracted: requires the extracted Coq runner backend (no semantic fallback)
    strict_rtl: requires an RTL simulator backend (iverilog or verilator)
    strict_node: requires the node binary (TRS-10 node verifier tests)
    z3: marks tests that require z3-solver Python package
    trs: TRS-10 receipt / verifier tests (run only in the dedicated trs-receipts CI job)
filterwarnings =
    ignore::pytest.PytestUnknownMarkWarning
    ignore::pytest.PytestCollectionWarning
    ignore::ImportWarning

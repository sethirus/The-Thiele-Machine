name: CI (Full)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

env:
  # Opt v4-era JS actions into Node.js 24. Removes the deprecation warning
  # without bumping action major versions (which can introduce breaking
  # behavior, e.g. upload-artifact@v5 makes artifacts immutable).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Import the primary CI checks first.
  # Hardware verification only runs after the main software/proof surface passes.
  fast-verify:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # Hardware synthesis & simulation. Runs in PARALLEL with fast-verify —
  # only consumes RTL files (.v) already in the repo at checkout, so it does
  # not depend on any fast-verify output. Previously gated as
  # `needs: fast-verify` for ordering, which serialized 17m + 15m = 32m of
  # critical path for no real reason.
  hardware-synthesis:
    name: Hardware synthesis & simulation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install synthesis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Capture toolchain version
        id: toolchain
        run: |
          coq_version=$(coqc --version | head -n1 | tr -s ' ' '_' | tr -d '(),')
          echo "coq=${coq_version}" >> "$GITHUB_OUTPUT"
          echo "Coq: ${coq_version}"

      - name: Cache vendor builds (bbv + kami)
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            vendor/bbv
            vendor/kami
          key: vendor-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-${{ hashFiles('.gitmodules', 'scripts/fix_kami_coq18.sh', 'vendor/bbv/**/*.v', 'vendor/kami/**/*.v') }}

      - name: Build vendored deps (bbv + kami)
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: |
          cd vendor/bbv && make -j4
          cd ../..
          bash scripts/fix_kami_coq18.sh
          cd vendor/kami && make -j4

      - name: Compute vendor build digest
        id: vendor-digest
        run: |
          digest=$(find vendor -type f \( -name '*.vo' -o -name '*.vok' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum 2>/dev/null \
            | sha256sum \
            | cut -c1-16)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Vendor .vo digest: ${digest}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Purge stale tracked Coq .vo files
        run: make coq-clean

      - name: Cache Coq build
        id: cache-coq
        uses: actions/cache@v4
        with:
          path: |
            coq/**/*.vo
            coq/**/*.vok
            coq/**/*.vos
            coq/**/*.glob
            coq/Makefile
            coq/Makefile.conf
          key: coq-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-vendor-${{ steps.vendor-digest.outputs.digest }}-${{ hashFiles('coq/**/*.v', 'coq/_CoqProject') }}

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Run hardware forge pipeline
        run: bash scripts/forge_artifact.sh

      - name: Synthesize with Yosys (stats + JSON netlist)
        run: |
          mkdir -p build
          yosys -p "
            read_verilog -sv -DSYNTHESIS thielecpu/hardware/rtl/RegFile.v thielecpu/hardware/rtl/thiele_cpu_kami.v thielecpu/hardware/rtl/thiele_cpu_top_min.v;
            prep -top thiele_cpu_top;
            check;
            stat;
            write_json build/netlist.json;
          " 2>&1 | tee build/synthesis.log

      - name: Verify synthesis
        run: |
          if ! grep -q "Number of cells:" build/synthesis.log; then
            echo "❌ Synthesis failed - no cell count"
            exit 1
          fi
          cells=$(grep "Number of cells:" build/synthesis.log | awk '{print $NF}' | tail -n1)
          if [ "${cells:-0}" -eq 0 ]; then
            echo "❌ Zero cells synthesized"
            exit 1
          fi
          echo "✓ Synthesis successful: $cells cells"
          if [ ! -s build/netlist.json ]; then
            echo "❌ JSON netlist missing"
            exit 1
          fi
          echo "✓ JSON netlist exported: build/netlist.json"

      - name: Simulate hardware
        run: |
          vvp build/thiele_cpu_tb.out +VCD=build/thiele_cpu_tb.vcd > build/simulation.log 2>&1

      - name: Verify simulation
        run: |
          if ! grep -q '"status"' build/simulation.log; then
            echo "❌ Simulation failed - no status output"
            exit 1
          fi
          if [ ! -s build/thiele_cpu_tb.vcd ]; then
            echo "❌ Simulation waveform (VCD) missing or empty"
            exit 1
          fi
          vcd_bytes=$(wc -c < build/thiele_cpu_tb.vcd)
          echo "✓ Simulation successful (VCD: ${vcd_bytes} bytes)"

      - name: Reproducible synthesis gate
        run: bash scripts/synthesis_repro_gate.sh

      - name: Upload hardware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-verification
          path: |
            build/synthesis.log
            build/simulation.log
            build/thiele_cpu_tb.vcd
            build/netlist.json
            artifacts/synthesis_gate/
          retention-days: 30

  # FPGA bitstream generation. yosys synth_xilinx + nextpnr-xilinx
  # place-and-route + xc7frames2bit packaging on the Digilent Genesys 2
  # target (Xilinx Kintex-7, xc7k325tffg900-2) using the 100% open-source
  # openXC7 toolchain. The RTL (.v) is committed and validated by
  # hardware-synthesis upstream, so this job only needs the FPGA toolchain
  # — no Coq/OCaml/Python/forge.
  fpga-bitstream:
    name: FPGA bitstream generation (Kintex-7 K325T / ffg900 / openXC7)
    runs-on: ubuntu-latest
    # No `needs:` — this job only reads .v files from the repo at checkout
    # and produces its own bitstream end-to-end. Previously gated as
    # `needs: hardware-synthesis` for ordering, which serialized 15m + 21m
    # of critical path on a dependency that wasn't there.
    #
    # CHSH_LASSERT's column_contractive_check_witness performs 22 wide
    # integer multiplications (widest two are 128×128 → 256). In Kami it's
    # implemented as a 23-phase FSM (`chsh_lassert_fsm` rule in
    # coq/kami_hw/ThieleCPUCore.v) that time-shares one 384×384 SignUU
    # multiplier across the phases, so only one wide multiply is live per
    # cycle. The Coq spec is still single-step — multi-cycle execution is
    # a Kami-implementation detail invisible to the spec, same pattern as
    # instr_lassert.  Even with the FSM, yosys's DSP48E1 inference would
    # fan that single multiplier out to more DSP48E1 slices than K325T's
    # 840 (wider operand widths force chained DSPs each) and slow
    # openXC7's placer to 1-2+ hours (sometimes timing out). synth_xc7.ys
    # specifies `-nodsp`, so the multiplier maps to LUTs and the design
    # fits in ~151K LUT6 of K325T's 203K (~74%). Placer finishes in
    # ~10 min.
    # `continue-on-error: false` (default): if bitstream generation fails,
    # CI must fail too. The job previously had continue-on-error: true,
    # which let packaging bugs (fasm2frames path errors, fasm pypi
    # circular-import regressions, etc.) hide behind a green checkmark.
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Install yosys + build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            yosys cmake g++ python3-pip libboost-all-dev libeigen3-dev libgflags-dev libyaml-cpp-dev
          # fasm pypi only ships 0.0.2.post* (no clean 0.0.2). The .post
          # wheels print a noisy "circular import" RuntimeWarning under
          # Python 3.12 and fall back to the slower textX parser — this
          # is cosmetic, fasm2frames still runs correctly. We leave fasm
          # unpinned so pip picks the latest .post that exists.
          pip install --break-system-packages fasm intervaltree simplejson

      - name: Build nextpnr-xilinx (openXC7)
        run: |
          git clone --depth 1 https://github.com/openXC7/nextpnr-xilinx.git /opt/nextpnr-xilinx
          cd /opt/nextpnr-xilinx
          git submodule update --init --recursive --depth 1
          # Trim non-Kintex-7 device databases to keep the chipdb step slim.
          # Keep all xc7k325t* (parent dir + ffg676 + ffg900 package subdirs)
          # — that's the target. Drop every other Kintex-7 part (and the other
          # 7-series families entirely).
          rm -rf xilinx/external/prjxray-db/zynq7 xilinx/external/prjxray-db/artix7 xilinx/external/prjxray-db/spartan7
          find xilinx/external/prjxray-db/kintex7 -maxdepth 1 -mindepth 1 -type d \
            ! -name 'xc7k325t*' -exec rm -rf {} +
          cmake -DARCH=xilinx -DBUILD_GUI=OFF -DBUILD_PYTHON=OFF .
          make -j$(nproc) nextpnr-xilinx bbasm
          sudo install -m 0755 nextpnr-xilinx /usr/local/bin/nextpnr-xilinx
          # bbasm is needed by fpga/run_synthesis_xc7.sh to build the chipdb
          # for xc7k325tffg900-2 at runtime; expose it on PATH and keep the
          # source-tree path stable for the script's bbaexport.py invocation.
          sudo install -m 0755 bbasm /usr/local/bin/bbasm

      - name: Build prjxray xc7frames2bit
        run: |
          git clone --depth 1 https://github.com/SymbiFlow/prjxray.git /opt/prjxray
          cd /opt/prjxray
          git submodule update --init --recursive
          rm -rf third_party/yosys
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTING=OFF .
          make -C build -j$(nproc) xc7frames2bit
          sudo install -m 0755 build/tools/xc7frames2bit /usr/local/bin/xc7frames2bit

      - name: Clone full prjxray-db (kintex7 only)
        # SymbiFlow/prjxray itself has no `database/` submodule; the bitstream
        # database is a separate repo (SymbiFlow/prjxray-db → f4pga/prjxray-db)
        # that openXC7 only ships a pruned subset of (no mapping/devices.yaml).
        # Shallow-clone the full repo and trim non-kintex7 families to keep
        # disk usage bounded.
        run: |
          git clone --depth 1 https://github.com/SymbiFlow/prjxray-db.git /opt/prjxray-db
          rm -rf /opt/prjxray-db/artix7 /opt/prjxray-db/spartan7 /opt/prjxray-db/zynq7
          test -f /opt/prjxray-db/kintex7/mapping/devices.yaml
          test -f /opt/prjxray-db/kintex7/xc7k325tffg900/part.yaml

      - name: Run yosys + nextpnr-xilinx + xc7frames2bit (Kintex-7 K325T)
        env:
          NEXTPNR_XILINX: /usr/local/bin/nextpnr-xilinx
          NEXTPNR_DIR:    /opt/nextpnr-xilinx
          BBASM:          /usr/local/bin/bbasm
          XC7FRAMES2BIT:  /usr/local/bin/xc7frames2bit
          PRJXRAY_DIR:    /opt/prjxray
          # Full SymbiFlow/prjxray-db clone: has mapping/devices.yaml +
          # per-part part.yaml + segbits_*.db. openXC7's nextpnr-xilinx
          # ships a pruned subset (chipdb-export only) that lacks mapping/.
          PRJXRAY_DB:     /opt/prjxray-db/kintex7
        run: bash fpga/run_synthesis_xc7.sh

      - name: Verify bitstream
        run: |
          if [ ! -s build/thiele_xc7k325t.bit ]; then
            echo "❌ Bitstream missing or empty"
            exit 1
          fi
          bytes=$(wc -c < build/thiele_xc7k325t.bit)
          echo "✓ Bitstream generated: build/thiele_xc7k325t.bit (${bytes} bytes)"

      - name: Upload bitstream
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpga-bitstream
          path: |
            build/thiele_xc7k325t.bit
            build/thiele_xc7k325t.fasm
            build/thiele_xc7k325t.frames
            build/thiele_xc7k325t.json
            build/yosys_xc7.log
            build/nextpnr_xc7.log
          retention-days: 90
          if-no-files-found: warn

  # Final summary — waits for every parallel branch to finish so the rollup
  # table reflects their actual outcomes. With fast-verify, hardware-synthesis,
  # and fpga-bitstream all running in parallel, the critical path is now
  # max(fast-verify, hardware-synthesis, fpga-bitstream) instead of their sum.
  verify-full:
    name: Full Verification Summary
    runs-on: ubuntu-latest
    needs: [fast-verify, hardware-synthesis, fpga-bitstream]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat > /tmp/summary.md << EOF
          ## Full Verification Summary

          | Phase | Status |
          |-------|--------|
          | Fast verify (proof + extraction + tests) | ${{ needs.fast-verify.result }} |
          | Hardware Synthesis | ${{ needs.hardware-synthesis.result }} |
          | FPGA Bitstream (K325T) | ${{ needs.fpga-bitstream.result }} |

          Critical path: max(fast-verify, hardware-synthesis, fpga-bitstream)
          rather than fast-verify → hardware-synthesis → fpga-bitstream.
          EOF
          cat /tmp/summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Fail if any required job failed
        # All three branches are required. Previously this only checked
        # hardware-synthesis, which let fpga-bitstream failures roll up
        # as a green "Full Verification Summary" — paired with the
        # FPGA job's old `continue-on-error: true` this masked bitstream
        # bugs entirely. Now every gate must pass.
        if: |
          needs.fast-verify.result == 'failure' ||
          needs.hardware-synthesis.result == 'failure' ||
          needs.fpga-bitstream.result == 'failure'
        run: exit 1

name: CI (Full)

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Import fast verification checks (proof + extraction + tests)
  # These must pass before hardware verification
  fast-verify:
    uses: ./.github/workflows/ci-fast.yml

  # Hardware synthesis & simulation (only runs if fast checks passed)
  hardware-synthesis:
    name: Hardware synthesis & simulation
    runs-on: ubuntu-latest
    needs: fast-verify
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install synthesis tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Build vendored deps (bbv + kami)
        run: |
          git submodule update --init --recursive vendor/bbv vendor/kami
          cd vendor/bbv && make -j4
          cd ../kami && make -j4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Run hardware forge pipeline
        run: bash scripts/forge_artifact.sh

      - name: Synthesize with Yosys
        run: |
          yosys -p "read_verilog -sv -DSYNTHESIS thielecpu/hardware/rtl/thiele_cpu_kami.v; prep -top mkModule1; check; stat" > build/synthesis.log 2>&1

      - name: Verify synthesis
        run: |
          if ! grep -q "Number of cells:" build/synthesis.log; then
            echo "❌ Synthesis failed - no cell count"
            exit 1
          fi
          echo "✓ Synthesis successful"

      - name: Simulate hardware
        run: |
          vvp build/thiele_cpu_tb.out +VCD=build/thiele_cpu_tb.vcd > build/simulation.log 2>&1

      - name: Verify simulation
        run: |
          if ! grep -q "Test completed" build/simulation.log; then
            echo "❌ Simulation failed"
            exit 1
          fi
          echo "✓ Simulation successful"

      - name: Analyze waveforms
        run: python scripts/analyze_waveforms.py build/thiele_cpu_tb.vcd > build/waveform_analysis.txt

      - name: Reproducible synthesis gate
        run: bash scripts/synthesis_repro_gate.sh

      - name: Upload hardware artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hardware-verification
          path: |
            build/synthesis.log
            build/simulation.log
            build/thiele_cpu_tb.vcd
            build/waveform_analysis.txt
            artifacts/synthesis_gate/
          retention-days: 30

  # FPGA bitstream generation (optional, requires nextpnr + trellis)
  fpga-bitstream:
    name: FPGA bitstream generation
    runs-on: ubuntu-latest
    needs: hardware-synthesis
    if: contains(fromJSON('["workflow_dispatch"]'), github.event_name)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install FPGA tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys \
            nextpnr-ecp5 fpga-trellis ecppack

      - name: Build vendored deps (bbv + kami)
        run: |
          git submodule update --init --recursive vendor/bbv vendor/kami
          cd vendor/bbv && make -j4
          cd ../kami && make -j4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Build bitstream
        run: bash scripts/forge_artifact.sh

      - name: Upload bitstream
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fpga-bitstream
          path: build/thiele_ecp5.bit
          retention-days: 90

  # Final summary
  verify-full:
    name: Full Verification Summary
    runs-on: ubuntu-latest
    needs: [hardware-synthesis]
    if: always()
    steps:
      - name: Generate summary
        run: |
          cat > /tmp/summary.md << 'EOF'
          ## ✅ Full Verification Summary
          
          | Phase | Status |
          |-------|--------|
          | Proof Verification | ✓ (from ci-fast) |
          | Extraction & Bisimulation | ✓ (from ci-fast) |
          | Python Tests | ✓ (from ci-fast) |
          | Dependencies | ✓ (from ci-fast) |
          | Hardware Synthesis | ${{ needs.hardware-synthesis.result }} |
          
          **All verification phases completed!**
          
          Artifacts available:
          - Inquisitor report
          - Hardware synthesis logs
          - Waveform analysis
          EOF
          cat /tmp/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Fail if synthesis failed
        if: needs.hardware-synthesis.result == 'failure'
        run: exit 1

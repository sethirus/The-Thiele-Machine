name: CI (Fast Path)

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Phase 1: Prepare common toolchain
  toolchain:
    name: Setup toolchain
    runs-on: ubuntu-latest
    outputs:
      cache-key: ${{ steps.cache-key.outputs.key }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Generate cache key
        id: cache-key
        run: |
          KEY="toolchain-${{ runner.os }}-coq-ocaml-$(date +%Y-%m)"
          echo "key=$KEY" >> $GITHUB_OUTPUT

      - name: Check tool cache
        id: cache-check
        uses: actions/cache@v4
        with:
          path: /tmp/thiele-tools-cache
          key: ${{ steps.cache-key.outputs.key }}
          lookup-only: true

      - name: Install and cache toolchain (if not cached)
        if: steps.cache-check.outputs.cache-hit != 'true'
        run: |
          set -euo pipefail
          mkdir -p /tmp/thiele-tools-cache
          
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml \
            ocaml-findlib \
            iverilog verilator yosys \
            python3-pip
          
          # Verify installations
          which coqc && coqc --version > /tmp/thiele-tools-cache/coq-version.txt
          which ocamlc && ocamlc -vnum > /tmp/thiele-tools-cache/ocaml-version.txt
          which ocamlrun > /tmp/thiele-tools-cache/ocamlrun-path.txt
          which iverilog > /tmp/thiele-tools-cache/iverilog-path.txt
          which verilator > /tmp/thiele-tools-cache/verilator-path.txt
          which yosys > /tmp/thiele-tools-cache/yosys-path.txt

      - name: Save tool cache
        if: steps.cache-check.outputs.cache-hit != 'true'
        uses: actions/cache@v4
        with:
          path: /tmp/thiele-tools-cache
          key: ${{ steps.cache-key.outputs.key }}

  # Phase 2: Proof verification (Coq + Inquisitor)
  proof-check:
    name: Proof verification
    runs-on: ubuntu-latest
    needs: toolchain
    env:
      OCAMLRUNPARAM: "l=64M"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Coq + OCaml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Build vendored deps (bbv + kami)
        run: |
          git submodule update --init --recursive vendor/bbv vendor/kami
          cd vendor/bbv && make -j4
          cd ../kami && make -j4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Coq proof tree
        run: |
          cd coq
          coq_makefile -f _CoqProject -o Makefile 2>&1 | grep -v "Warning:"
          make -j4

      - name: Run Inquisitor proof audit
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          python scripts/inquisitor.py --report INQUISITOR_REPORT.md

      - name: Run reproducible proof gate
        run: bash scripts/proof_gate_reproducible.sh

      - name: Upload Inquisitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inquisitor-report
          path: INQUISITOR_REPORT.md
          retention-days: 7

  # Phase 3: OCaml extraction (depends on proof passing)
  extraction:
    name: OCaml extraction & 3-layer bisimulation
    runs-on: ubuntu-latest
    needs: proof-check
    env:
      OCAMLRUNPARAM: "l=64M"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Coq + OCaml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Build vendored deps (bbv + kami)
        run: |
          git submodule update --init --recursive vendor/bbv vendor/kami
          cd vendor/bbv && make -j4
          cd ../kami && make -j4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Extract Coq to OCaml
        run: |
          cd coq
          coq_makefile -f _CoqProject -o Makefile 2>&1 | grep -v "Warning:"
          make -j4
          make Extraction.vo

      - name: Compile extracted runner
        run: |
          ocamlfind ocamlc -I build -package str -linkpkg \
            -o build/extracted_vm_runner \
            build/thiele_core.mli \
            build/thiele_core.ml \
            tools/extracted_vm_runner.ml

      - name: Run 3-layer bisimulation tests
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps
          bash scripts/parity_extracted_only.sh

  # Phase 4: Python tests (independent, can run in parallel with extraction)
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    needs: toolchain
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install runtime toolchain for Python tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Run pytest
        run: python -m pytest tests/ -q --tb=short -m "not coq and not strict_rtl"

  # Phase 5: Dependency audit (independent)
  dependencies:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pip-audit
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet pip-audit

      - name: Run pip-audit
        run: |
          # CVE-2025-53000: Windows-specific SVG->PDF vulnerability (not applicable to Linux CI)
          # Documented in SECURITY.md
          pip-audit -r requirements.txt --progress=off --ignore-vuln CVE-2025-53000

  # Summary
  verify-fast:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: [proof-check, extraction, python-tests, dependencies]
    if: always()
    steps:
      - name: Check job results
        run: |
          cat > /tmp/summary.md << 'EOF'
          ## ✅ Fast Verification Summary
          
          | Component | Status |
          |-----------|--------|
          | Proof (Coq) | ${{ needs.proof-check.result }} |
          | Extraction (OCaml) | ${{ needs.extraction.result }} |
          | Python Tests | ${{ needs.python-tests.result }} |
          | Dependencies | ${{ needs.dependencies.result }} |
          
          **All checks passed!** ✓
          
          Next steps:
          - If making hardware changes, run: `./scripts/quick_verify.sh full`
          - See workflow logs above for details
          EOF
          cat /tmp/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: |
          needs.proof-check.result == 'failure' ||
          needs.extraction.result == 'failure' ||
          needs.python-tests.result == 'failure' ||
          needs.dependencies.result == 'failure'
        run: exit 1

name: CI

on:
  # Trigger on push to ANY branch — feature branches need the same gate as
  # main, otherwise a "green locally + green PR" assumption gets to develop
  # silently. workflow_dispatch is still here for manual re-runs, and
  # workflow_call is used by ci-full.yml.
  push:
  pull_request:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

env:
  # Opt v4-era JS actions into Node.js 24. Removes the deprecation warning
  # without bumping action major versions (which can introduce breaking
  # behavior, e.g. upload-artifact@v5 makes artifacts immutable).
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  # Phase 1: Proof verification (Coq + Inquisitor)
  proof-check:
    name: Proof verification
    runs-on: ubuntu-latest
    env:
      OCAMLRUNPARAM: "l=64M"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Coq + OCaml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Capture toolchain version
        # Coq updates from apt can silently produce .vo files incompatible
        # with previously-cached ones. Including the exact coqc version in
        # all cache keys forces a clean rebuild whenever Coq changes.
        id: toolchain
        run: |
          coq_version=$(coqc --version | head -n1 | tr -s ' ' '_' | tr -d '(),')
          echo "coq=${coq_version}" >> "$GITHUB_OUTPUT"
          echo "Coq: ${coq_version}"

      - name: Cache vendor builds (bbv + kami)
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            vendor/bbv
            vendor/kami
          key: vendor-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-${{ hashFiles('.gitmodules', 'scripts/fix_kami_coq18.sh', 'vendor/bbv/**/*.v', 'vendor/kami/**/*.v') }}

      - name: Build vendored deps (bbv + kami)
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: |
          cd vendor/bbv && make -j4
          cd ../..
          bash scripts/fix_kami_coq18.sh
          cd vendor/kami && make -j4

      - name: Compute vendor build digest
        # Hash all vendor .vo files so the coq cache key tracks the actual
        # vendor binary state — not just .v sources. Two vendor builds with
        # identical sources can still produce .vo files with different
        # module digests, which then make tracked coq/.vo files inconsistent.
        id: vendor-digest
        run: |
          digest=$(find vendor -type f \( -name '*.vo' -o -name '*.vok' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum 2>/dev/null \
            | sha256sum \
            | cut -c1-16)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Vendor .vo digest: ${digest}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Purge stale tracked Coq .vo files
        # coq/**/*.vo are TRACKED in git (.gitignore: "coq/*.vo and coq/*.glob
        # are tracked"). After git checkout they're on disk with timestamps
        # that make `make` skip recompilation — but they reference whatever
        # vendor/kami digests were current when the .vo was committed. If
        # vendor was rebuilt, those digests no longer match and we get
        # "inconsistent assumptions over library Kami.Semantics". Forcing a
        # clean coq/ tree before the cache restore (or fresh build) is the
        # only reliable fix without untracking the .vo files.
        run: make coq-clean

      - name: Cache Coq build
        id: cache-coq
        uses: actions/cache@v4
        with:
          path: |
            coq/**/*.vo
            coq/**/*.vok
            coq/**/*.vos
            coq/**/*.glob
            coq/Makefile
            coq/Makefile.conf
          key: coq-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-vendor-${{ steps.vendor-digest.outputs.digest }}-${{ hashFiles('coq/**/*.v', 'coq/_CoqProject') }}

      - name: Build Coq proof tree
        run: |
          cd coq
          coq_makefile -f _CoqProject -o Makefile 2>&1 | { grep -v "Warning:" || true; }
          make -j4

      - name: Guard against Kami cheat axiom usage
        run: |
          if grep -r --include='*.v' -n -e 'apply cheat' -e 'exact cheat' coq/ | grep -v vendor/ | grep .; then
            echo "FATAL: cheat axiom used in Thiele proofs (outside vendor/)"
            exit 1
          fi
          echo "OK: no cheat axiom usage found in Thiele proofs"

      - name: Run Inquisitor proof audit
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          # Proof-scope drift gate runs first: it's the same invariant
          # the pre-commit hook enforces locally, so any divergence
          # between coq/_CoqProject, on-disk .v files, and the canonical
          # NON_PROOF_BEARING_FILES list shows up here with a clear
          # diagnostic before the heavier audits run.
          python -m pytest tests/test_coq_proof_scope.py -v
          python scripts/inquisitor.py --report INQUISITOR_REPORT.md

      - name: Forge surface smoke test
        run: |
          python3 scripts/forge.py \
            --input build/thiele_core.ml \
            --out-python /tmp/_forge_smoke.py \
            --check-only

      - name: Run bedrock assumption gate
        run: python scripts/inquisitor_assumption_gate.py

      - name: Run reproducible proof gate
        run: bash scripts/proof_gate_reproducible.sh

      - name: Upload Inquisitor report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: inquisitor-report
          path: INQUISITOR_REPORT.md
          retention-days: 7

  # Phase 2: OCaml extraction (depends on proof passing)
  extraction:
    name: OCaml extraction & 3-layer bisimulation
    runs-on: ubuntu-latest
    needs: proof-check
    env:
      OCAMLRUNPARAM: "l=64M"
      THIELE_EXTRACTION_FULL: "1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Coq + OCaml
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Capture toolchain version
        id: toolchain
        run: |
          coq_version=$(coqc --version | head -n1 | tr -s ' ' '_' | tr -d '(),')
          echo "coq=${coq_version}" >> "$GITHUB_OUTPUT"
          echo "Coq: ${coq_version}"

      - name: Cache vendor builds (bbv + kami)
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            vendor/bbv
            vendor/kami
          key: vendor-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-${{ hashFiles('.gitmodules', 'scripts/fix_kami_coq18.sh', 'vendor/bbv/**/*.v', 'vendor/kami/**/*.v') }}

      - name: Build vendored deps (bbv + kami)
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: |
          cd vendor/bbv && make -j4
          cd ../..
          bash scripts/fix_kami_coq18.sh
          cd vendor/kami && make -j4

      - name: Compute vendor build digest
        id: vendor-digest
        run: |
          digest=$(find vendor -type f \( -name '*.vo' -o -name '*.vok' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum 2>/dev/null \
            | sha256sum \
            | cut -c1-16)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Vendor .vo digest: ${digest}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Purge stale tracked Coq .vo files
        run: make coq-clean

      - name: Cache Coq build
        id: cache-coq
        uses: actions/cache@v4
        with:
          path: |
            coq/**/*.vo
            coq/**/*.vok
            coq/**/*.vos
            coq/**/*.glob
            coq/Makefile
            coq/Makefile.conf
          key: coq-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-vendor-${{ steps.vendor-digest.outputs.digest }}-${{ hashFiles('coq/**/*.v', 'coq/_CoqProject') }}

      - name: Extract Coq to OCaml
        run: |
          cd coq
          coq_makefile -f _CoqProject -o Makefile 2>&1 | { grep -v "Warning:" || true; }
          make -j4
          make Extraction.vo

      - name: Compile extracted runner
        run: |
          ocamlfind ocamlc -I build -package str -linkpkg \
            -o build/extracted_vm_runner \
            build/thiele_core.mli \
            build/thiele_core.ml \
            build/extracted_vm_runner.ml

      - name: Run 3-layer bisimulation tests
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps
          bash scripts/parity_extracted_only.sh

  # Phase 3: Python tests (independent, can run in parallel with extraction)
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install runtime toolchain for Python tests
        # Full toolchain so EVERY test pytest collects can actually run —
        # no marker exclusion, no toolchain-missing skips. Specifically:
        #   coq + coinor-csdp     → coq-marked tests (test_coq_compile_gate,
        #                            test_extraction_freshness, test_coq_available)
        #   ocaml + ocaml-findlib → build/extracted_vm_runner binary so
        #                            test_quantitative_nfi's OCaml-runner
        #                            agreement test stops skipping
        #   iverilog + verilator + yosys → strict_rtl-marked cross-layer
        #                                  bisimulation, RTL structural
        #                                  coverage, hypothesis cross-layer
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            coq coinor-csdp \
            ocaml ocaml-findlib \
            iverilog verilator yosys

      - name: Capture toolchain version
        # Match the cache-key construction used by proof-check / extraction
        # so all three jobs share the same vendor + Coq build caches.
        id: toolchain
        run: |
          coq_version=$(coqc --version | head -n1 | tr -s ' ' '_' | tr -d '(),')
          echo "coq=${coq_version}" >> "$GITHUB_OUTPUT"
          echo "Coq: ${coq_version}"

      - name: Cache vendor builds (bbv + kami)
        # test_extraction_freshness::test_full_extraction_matches_committed
        # invokes `make Extraction.vo` inside coq/, which transitively needs
        # vendor/kami/Kami/Kami.vo. Same cache key as proof-check means this
        # job is a cache HIT after proof-check populates it.
        id: cache-vendor
        uses: actions/cache@v4
        with:
          path: |
            vendor/bbv
            vendor/kami
          key: vendor-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-${{ hashFiles('.gitmodules', 'scripts/fix_kami_coq18.sh', 'vendor/bbv/**/*.v', 'vendor/kami/**/*.v') }}

      - name: Build vendored deps (bbv + kami)
        if: steps.cache-vendor.outputs.cache-hit != 'true'
        run: |
          cd vendor/bbv && make -j4
          cd ../..
          bash scripts/fix_kami_coq18.sh
          cd vendor/kami && make -j4

      - name: Compute vendor build digest
        id: vendor-digest
        run: |
          digest=$(find vendor -type f \( -name '*.vo' -o -name '*.vok' \) -print0 \
            | sort -z \
            | xargs -0 sha256sum 2>/dev/null \
            | sha256sum \
            | cut -c1-16)
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "Vendor .vo digest: ${digest}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        # trs-marked tests use a Node verifier (tests/test_trs10_node_verifier.py
        # and friends). Node 24 matches the dedicated trs-receipts job.
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Purge stale tracked Coq .vo files
        # Same pre-build cleanup proof-check uses.
        run: make coq-clean

      - name: Cache Coq build
        id: cache-coq
        uses: actions/cache@v4
        with:
          path: |
            coq/**/*.vo
            coq/**/*.vok
            coq/**/*.vos
            coq/**/*.glob
            coq/Makefile
            coq/Makefile.conf
          key: coq-${{ runner.os }}-${{ steps.toolchain.outputs.coq }}-vendor-${{ steps.vendor-digest.outputs.digest }}-${{ hashFiles('coq/**/*.v', 'coq/_CoqProject') }}

      - name: Build Coq proof tree
        # test_full_extraction_matches_committed runs `make Extraction.vo`
        # which depends on the whole proof tree. Build it once here (cache
        # hits on the second+ run since proof-check shares the same key).
        if: steps.cache-coq.outputs.cache-hit != 'true'
        run: |
          cd coq
          coq_makefile -f _CoqProject -o Makefile 2>&1 | { grep -v "Warning:" || true; }
          make -j4

      - name: Restore tracked Coq-extracted artefacts
        # `make -j4` above transitively builds the Coq files whose
        # `Extraction "..."` directives write build/ as a side effect:
        #   coq/kami_hw/KamiExtraction.v → build/kami_hw/Target.{ml,mli}
        #   coq/Extraction.v             → build/thiele_core.{ml,mli}
        #   coq/ThieleMachineComplete.v  → build/thiele_core_complete.{ml,mli}
        #                                  + build/kami_hw/Target_complete.{ml,mli}
        #
        # All four outputs are tracked in git. The downstream BSV/Verilog
        # pipeline (mkModule1_synth.v, thiele_cpu_kami.v) and the OCaml
        # extracted-runner binary are byte-pinned to the committed
        # versions via artifacts/rtl_pipeline_manifest.json. CI's
        # vendor-cache state can produce subtly different extraction
        # bytes than the developer machine at commit time even at the
        # same Coq version (the Kami .vo state is part of the closure
        # KamiExtraction sees), which makes the manifest test fail on
        # a clean rebuild.
        #
        # Restore the tracked versions before any downstream step reads
        # build/ so every test sees the same content the manifest pins.
        # If extraction goes stale relative to the .v sources, the
        # *committed* version is wrong — that's a pre-commit-hook
        # concern, not a CI-job concern.
        run: |
          git checkout HEAD -- \
            build/kami_hw/Target.ml build/kami_hw/Target.mli \
            build/kami_hw/Target_complete.ml build/kami_hw/Target_complete.mli \
            build/thiele_core.ml build/thiele_core.mli \
            build/thiele_core_complete.ml build/thiele_core_complete.mli

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Build OCaml extracted VM runner
        # build/thiele_core.{ml,mli} and build/extracted_vm_runner.ml are
        # tracked in git (extraction outputs committed alongside the spec
        # change that produced them), so the runner is a pure ocamlc build
        # — no coqc invocation needed here. This is what trs-receipts does.
        run: |
          ocamlfind ocamlc -I build -package str -linkpkg \
            -o build/extracted_vm_runner \
            build/thiele_core.mli \
            build/thiele_core.ml \
            build/extracted_vm_runner.ml

      - name: Run pytest (FULL suite — no marker filter, no skips)
        run: python -m pytest tests/ -q --tb=short

  trs-receipts:
    name: TRS receipt tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install runtime toolchain for verifier matrix
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ocaml ocaml-findlib

      - name: Install dependencies
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet -r requirements.txt
          pip install --quiet -e . --no-deps

      - name: Compile extracted VM runner for Node verifier
        run: |
          ocamlfind ocamlc -I build -package str -linkpkg \
            -o build/extracted_vm_runner \
            build/thiele_core.mli \
            build/thiele_core.ml \
            build/extracted_vm_runner.ml

      - name: Run TRS receipt tests
        run: |
          python -m pytest \
            tests/test_properties.py \
            tests/test_execution_receipt_cli.py \
            tests/test_trs10_standalone_verifier.py \
            tests/test_trs10_fixture_layout.py \
            tests/test_trs10_fixture_corpus.py \
            tests/test_trs10_node_verifier.py \
            tests/test_trs10_matrix_cases.py \
            -q --tb=short

  # Phase 4: Dependency audit (independent)
  dependencies:
    name: Dependency security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --quiet --upgrade pip
          pip install --quiet pip-audit

      - name: Run pip-audit
        run: |
          # CVE-2025-53000: Windows-specific SVG->PDF vulnerability (not applicable to Linux CI)
          # Documented in SECURITY.md
          pip-audit -r requirements.txt --progress=off --ignore-vuln CVE-2025-53000

  # Summary
  verify-summary:
    name: Verification Summary
    runs-on: ubuntu-latest
    needs: [proof-check, extraction, python-tests, trs-receipts, dependencies]
    if: always()
    steps:
      - name: Check job results
        run: |
          cat > /tmp/summary.md << 'EOF'
          ## ✅ Verification Summary

          | Component | Result |
          |-----------|--------|
          | Proof (Coq + Inquisitor) | ${{ needs.proof-check.result }} |
          | Extraction (OCaml + Bisimulation) | ${{ needs.extraction.result }} |
          | Python Tests | ${{ needs.python-tests.result }} |
          | TRS Receipts | ${{ needs.trs-receipts.result }} |
          | Dependency Scan | ${{ needs.dependencies.result }} |

          **Verification Status:** ${{ job.status }}

          > **Note:** This is the fast verification path (proof + extraction + tests).
          > For full verification including hardware synthesis, see the nightly run or use:
          > ```
          > make closeout-gate
          > ```
          EOF
          cat /tmp/summary.md >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: |
          needs.proof-check.result == 'failure' ||
          needs.extraction.result == 'failure' ||
          needs.python-tests.result == 'failure' ||
          needs.trs-receipts.result == 'failure' ||
          needs.dependencies.result == 'failure'
        run: exit 1
